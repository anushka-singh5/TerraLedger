services:
  - type: web
    name: terraledger-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      # ── Oracle signer (secret — set in Render dashboard) ──────────────────
      - key: PRIVATE_KEY
        sync: false

      # ── Blockchain ────────────────────────────────────────────────────────
      - key: QIE_RPC_URL
        value: "https://rpc1mainnet.qie.digital/"
      - key: NEXT_PUBLIC_QIE_CHAIN_ID
        value: "1990"

      # ── Contract addresses — v6 mainnet deployment (chain 1990) ──────────
      - key: ORACLE_CONTRACT_ADDRESS
        value: "0x606b15fD35DcaD1e0104b6e6c1E783BB84252f55"
      - key: NEXT_PUBLIC_PROJECT_REGISTRY_ADDRESS
        value: "0xC780b1C96175e59B559315c0Df00B0E8c06750dc"
      - key: NEXT_PUBLIC_CARBON_CREDIT_ADDRESS
        value: "0x7Bb8999aa1163bD9438e3efcf40CE28a73d8677C"
      - key: NEXT_PUBLIC_CARBON_ORACLE_ADDRESS
        value: "0x606b15fD35DcaD1e0104b6e6c1E783BB84252f55"
      - key: NEXT_PUBLIC_MARKETPLACE_ADDRESS
        value: "0xCf994675A919892AcD43D6E285127b3743402B58"
      - key: NEXT_PUBLIC_QUSDC_ADDRESS
        value: "0x3F43DA82eC9A4f5285F10FaF1F26EcA7319E5DA5"
      - key: NEXT_PUBLIC_QIEPASS_ADDRESS
        value: "0x5D41F203BaFF1CBb503394E6C9fD9F0C95696b7D"
      - key: NEXT_PUBLIC_TCC_ADDRESS
        value: "0x54b96be03e161C12B1e07b013CdFdFF69490c624"
      - key: NEXT_PUBLIC_TCC_MARKETPLACE_ADDRESS
        value: "0x7E61D69115dd4f1c2823B4d0a28bE71060424691"
      - key: NEXT_PUBLIC_RETIREMENT_CERT_ADDRESS
        value: "0xb87140fcb58B4Aa8f8a3796B3a961Ec2D0F100F2"
      - key: NEXT_PUBLIC_QIE_RPC
        value: "https://rpc1mainnet.qie.digital/"

      # ── CORS (set your Vercel URL here) ───────────────────────────────────
      - key: ALLOWED_ORIGINS
        sync: false

      # ── Optional API keys (each module degrades gracefully if missing) ────
      - key: NASA_FIRMS_API_KEY
        sync: false
      - key: PINATA_JWT
        sync: false
      - key: QIE_PASS_BASE_URL
        value: "https://pass-api.qie.digital"
      - key: QIE_PASS_PUBLIC_KEY
        sync: false
      - key: QIE_PASS_SECRET_KEY
        sync: false

      # ── AI audit (Ollama — not available on Render free tier, uses template fallback) ──
      - key: OLLAMA_URL
        value: "http://localhost:11434"
      - key: OLLAMA_MODEL
        value: "llama3"
